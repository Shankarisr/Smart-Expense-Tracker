<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Mobile Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <app-header>
        <h1>Expense Tracker</h1>
    </app-header>

    <!-- Summary Cards -->
    <div class="summary-cards">
        <div class="summary-card balance">
            <div>
                <div class="card-label">Current Balance</div>
                <div class="card-amount" id="card-balance">₹0</div>
            </div>
            <div style="font-size: 1.5rem;">🏦</div>
        </div>
        <div class="summary-card income">
            <div>
                <div class="card-label">Income (This Month)</div>
                <div class="card-amount" id="card-income">₹0</div>
            </div>
            <div style="font-size: 1.5rem;">📈</div>
        </div>
        <div class="summary-card expense">
            <div>
                <div class="card-label">Expenses (This Month)</div>
                <div class="card-amount" id="card-expense">₹0</div>
            </div>
            <div style="font-size: 1.5rem;">📉</div>
        </div>
    </div>

    <!-- Transaction History -->
    <div class="section">
        <div class="section-header">
            <h2 class="section-title">Recent Transactions</h2>
        </div>
        <input type="text" id="search" class="search-bar" placeholder="Search transactions...">

        <div id="transactions-list" class="transaction-list">
            <!-- Transactions injected here -->
        </div>
        <div id="no-data" class="empty-state text-center hidden">
            No transactions found for this month.
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="btn-fab-add">
        <span style="font-size: 1.4rem;">+</span> Add
    </button>

    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Transaction</h2>
                <button class="btn-close" id="btn-modal-close">×</button>
            </div>
            <form id="transaction-form">
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" required min="1" step="any" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="type" required>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required></select>
                </div>
                <div class="form-group hidden" id="other-category-group">
                    <label>Specify Other Category</label>
                    <input type="text" id="other-category" placeholder="e.g. Snack, Movie">
                </div>
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <input type="text" id="description" placeholder="What was this for?">
                </div>
                <div style="display: flex; gap: 12px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Time</label>
                        <input type="time" id="time" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Save Transaction</button>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            Dashboard
        </a>
        <a href="reports.html" class="nav-item">
            <span class="nav-icon">📊</span>
            Reports
        </a>
        <a href="analytics.html" class="nav-item">
            <span class="nav-icon">📈</span>
            Analytics
        </a>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Success!</div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
